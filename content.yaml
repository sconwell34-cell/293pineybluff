# =============================================================================
# 293 PINEY BLUFF — CONTENT FILE
# =============================================================================
#
# This is the only file you regularly edit. It controls everything visible
# on the site: building names, descriptions, walkthroughs, system categories.
#
# RULES OF THE FILE:
#   1. Indentation matters. Use 2 spaces for each level. NEVER tabs.
#   2. Every walkthrough has the same five fields:
#        title, location, system, video, description
#   3. If you don't have a video URL yet, leave it as: video: ""
#      The QR code will still work but show "video coming soon."
#   4. After saving any change, the website rebuilds itself within ~2 minutes.
#
# IF SOMETHING BREAKS:
#   GitHub keeps every previous version. See MAINTENANCE.md for how to roll back.
#
# =============================================================================

site:
  title: "293 Piney Bluff"
  tagline: "Operations and systems reference for the farm."
  owner: "Wesley Shawn Conwell, M.D."
  signature: "wsc"

# -----------------------------------------------------------------------------
# SYSTEMS — the dropdown menu categories
# -----------------------------------------------------------------------------
systems:
