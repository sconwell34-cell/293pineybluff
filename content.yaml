    name: "Electrical"
    icon: "bolt"
    description: "Three independent service entries, panels, and circuits across the property."

  - id: solar
    name: "Solar & battery"
    icon: "sun"
    description: "SolarEdge SHP3 inverter, EcoFlow battery storage, and the household microgrid."

  - id: climate
    name: "Climate / geothermal"
    icon: "thermometer"
    description: "Eight-ton geothermal stack, three compressors, propane backup."

  - id: domestic-water
    name: "Domestic water"
    icon: "drop"
    description: "House well, plumbing, water heaters, and household fixtures."

  - id: livestock-water
    name: "Livestock water"
    icon: "drop"
    description: "Barn well, troughs, tank heaters, freeze protection."

  - id: irrigation
    name: "Irrigation"
    icon: "sprinkler"
    description: "Front-yard well, hand-pump backup, sprinkler zones."

  - id: network
    name: "Network"
    icon: "wifi"
    description: "Peplink router, UniFi switches, UBB shop bridge, Starlink and LTE."

  - id: livestock
    name: "Livestock"
    icon: "cow"
    description: "Cattle operations, hay rotation, tack, medical, records."

  - id: equipment
    name: "Equipment"
    icon: "tractor"
    description: "F-250, tractor, implements, fuel storage."

  - id: structures
    name: "Structures"
    icon: "house"
    description: "House, shop, barn, run-in, equipment shed, and the brush-burn area."

